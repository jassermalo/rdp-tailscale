name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-bore"
          netsh advfirewall firewall add rule name="RDP-bore" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          Write-Host "========================================="
          Write-Host "  RDP Username : RDP"
          Write-Host "  RDP Password : $password"
          Write-Host "========================================="

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Download and Run bore
        run: |
          # Download latest bore Windows binary
          $boreUrl = "https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.0-x86_64-pc-windows-msvc.zip"
          $zipPath = "$env:TEMP\bore.zip"
          $boreDir = "$env:TEMP\bore"

          Invoke-WebRequest -Uri $boreUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $boreDir -Force

          $boreBin = Get-ChildItem -Path $boreDir -Filter "bore.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName

          # Start bore in background and capture output to get the assigned port
          $logFile = "$env:TEMP\bore_output.txt"
          Start-Process -FilePath $boreBin `
            -ArgumentList "local", "3389", "--to", "bore.pub" `
            -RedirectStandardOutput $logFile `
            -NoNewWindow

          # Wait for bore to assign a port (up to 30 seconds)
          $borePort = $null
          $retries = 0
          while (-not $borePort -and $retries -lt 30) {
              Start-Sleep -Seconds 1
              $retries++
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
                  if ($content -match 'bore.pub:(\d+)') {
                      $borePort = $matches[1]
                  }
              }
          }

          if (-not $borePort) {
              Write-Error "bore failed to start or get a port"
              exit 1
          }

          Write-Host "========================================="
          Write-Host "  RDP Address  : bore.pub:$borePort"
          Write-Host "  RDP Username : RDP"
          Write-Host "  RDP Password : $env:RDP_PASSWORD"
          Write-Host "========================================="

          echo "BORE_PORT=$borePort" >> $env:GITHUB_ENV

      - name: Keep Session Alive
        run: |
          Write-Host ""
          Write-Host "========================================="
          Write-Host "  Connect via Remote Desktop:"
          Write-Host "  Address  : bore.pub:$env:BORE_PORT"
          Write-Host "  Username : RDP"
          Write-Host "  Password : $env:RDP_PASSWORD"
          Write-Host "========================================="

          while ($true) {
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Session active — bore.pub:$env:BORE_PORT"
              Start-Sleep -Seconds 60
          }
