name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Enable RDP and Optimize Speed
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "ColorDepth" -Value 4 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "CompressedData" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "AllowFontSmoothing" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fEnableDesktopComposition" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "NetworkAutoDetect" -Value 1 -Force
          net user Administrator 12345
          net user Administrator /active:yes
          netsh advfirewall firewall delete rule name="RDP-bore" 2>$null
          netsh advfirewall firewall add rule name="RDP-bore" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force
          Write-Host "RDP enabled - Administrator password set to 12345"

      - name: Install Google Chrome
        shell: pwsh
        run: |
          $installer = "$env:TEMP\chrome.msi"
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/googlechromestandaloneenterprise64.msi" -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", $installer, "/quiet", "/norestart" -Wait
          Remove-Item $installer -Force -ErrorAction SilentlyContinue
          Write-Host "Chrome installed"

      - name: Download and Run bore
        shell: pwsh
        run: |
          $boreZip = "$env:TEMP\bore.zip"
          $boreDir = "$env:TEMP\bore"
          $boreUrl = "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-pc-windows-msvc.zip"

          Invoke-WebRequest -Uri $boreUrl -OutFile $boreZip -UseBasicParsing
          Expand-Archive -Path $boreZip -DestinationPath $boreDir -Force

          $boreBin = (Get-ChildItem -Path $boreDir -Filter "bore.exe" -Recurse | Select-Object -First 1).FullName
          Write-Host "bore binary: $boreBin"

          $logFile = "$env:TEMP\bore.log"
          Start-Process -FilePath $boreBin -ArgumentList "local", "3389", "--to", "bore.pub" -RedirectStandardOutput $logFile -NoNewWindow

          $borePort = $null
          for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              if (Test-Path $logFile) {
                  $content = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
                  Write-Host "bore log: $content"
                  if ($content -match 'bore\.pub:(\d+)') {
                      $borePort = $matches[1]
                      break
                  }
              }
          }

          if (-not $borePort) {
              Write-Error "bore failed - no port assigned"
              exit 1
          }

          echo "BORE_PORT=$borePort" >> $env:GITHUB_ENV

          Write-Host "================================"
          Write-Host "  RDP READY"
          Write-Host "  Address  : bore.pub:$borePort"
          Write-Host "  Username : Administrator"
          Write-Host "  Password : 12345"
          Write-Host "================================"

      - name: Keep Session Alive
        shell: pwsh
        run: |
          Write-Host "================================"
          Write-Host "  Address  : bore.pub:$env:BORE_PORT"
          Write-Host "  Username : Administrator"
          Write-Host "  Password : 12345"
          Write-Host "================================"
          while ($true) {
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Active - bore.pub:$env:BORE_PORT"
              Start-Sleep -Seconds 60
          }
